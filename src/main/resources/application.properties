spring.application.name=rest
server.port=${SERVER_PORT:8085}
spring.datasource.url=${DB_STRING_CONNECTION:jdbc\:postgresql\://localhost\:5432/libros}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${JPA_SHOWSQL:true}
logging.level.com.zaxxer.hikari=${LOG_LEVEL:DEBUG}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_IDLE:5}

